name: URL liveness audit

# Detects when vendor status URLs go dead so the static map doesn't silently rot.
# Triggers:
#   • Weekly schedule  — Mondays 03:00 UTC (catches gradual decay)
#   • PR to main       — when src/types/index.ts or src/lib/status-discovery.ts changes
#   • Manual dispatch  — for ad-hoc verification
#
# Failure mode: any URL that returns non-200, non-JSON, or non-statuspage shape
# across 3 retries (1.5 s apart) blocks the workflow with a non-zero exit.

on:
  schedule:
    - cron: "0 3 * * 1"
  pull_request:
    branches: [main]
    paths:
      - "src/types/index.ts"
      - "src/lib/status-discovery.ts"
      - "scripts/audit-static-urls.ts"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Probe every URL in PRODUCT_RULES + VENDOR_STATUS_MAP
        shell: bash
        # pipefail so `tee` doesn't swallow the audit script's exit code
        run: |
          set -o pipefail
          node --experimental-strip-types scripts/audit-static-urls.ts 2>&1 | tee audit.log

      # A failed scheduled run otherwise dies silently — nobody reads the
      # Actions tab. File (or bump) an issue so the rot is visible.
      - name: File an issue for dead URLs
        if: failure() && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create url-audit --color D93F0B --description "Dead vendor status URL detected by the weekly audit" --repo "$GITHUB_REPOSITORY" 2>/dev/null || true

          BODY_FILE=$(mktemp)
          {
            echo "The weekly URL liveness audit found dead vendor status URLs."
            echo ""
            echo "Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo ""
            echo '```'
            # everything from the "Dead URLs:" marker onward; fall back to full log tail
            sed -n '/^Dead URLs:/,$p' audit.log | head -80
            echo '```'
          } > "$BODY_FILE"

          EXISTING=$(gh issue list --repo "$GITHUB_REPOSITORY" --label url-audit --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --repo "$GITHUB_REPOSITORY" --body-file "$BODY_FILE"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" \
              --title "Weekly URL audit: dead vendor status URLs detected" \
              --label url-audit \
              --body-file "$BODY_FILE"
          fi
