name: CI

# Lint + typecheck + unit tests + production build on every push/PR to main.
# The unit tests cover the status-payload parsers (src/lib/status-extract.ts,
# with real vendor payload fixtures), the share-link codec, and the SSRF guard
# — the three modules where regressions are silent and user-facing.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build
